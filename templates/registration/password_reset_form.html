<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mot de passe oublié — InkRise</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input[type="email"] { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 1.25rem; padding: 10px 18px; cursor: pointer; }
    .err { color: #b42318; margin-top: 0.75rem; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
  <h1>Réinitialiser le mot de passe</h1>
  <p>Indiquez l’adresse e-mail de votre compte. Vous recevrez un lien pour choisir un nouveau mot de passe.</p>
  <form method="post">{% csrf_token %}
    {% if form.email.errors %}<div class="err">{{ form.email.errors }}</div>{% endif %}
    <label for="id_email">E-mail</label>
    {{ form.email }}
    <button type="submit">Envoyer le lien</button>
  </form>
  <p><a href="/login/">Retour à la connexion</a></p>
</body>
</html>
